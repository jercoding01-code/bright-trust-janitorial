{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cleaner Portal Login | Bright Trust Janitorial</title>
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
    <style>
        body {
            background-color: #f3f4f6;
            margin: 0;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
        }
        .login-card {
            background: white;
            padding: 40px 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            max-width: 400px;
            width: 90%;
            text-align: center;
            border-top: 6px solid var(--logo-blue);
        }
        .logo {
            max-width: 140px;
            height: auto;
            margin-bottom: 20px;
        }
        h2 {
            margin-top: 0;
            color: var(--logo-black);
            font-size: 1.5rem;
            margin-bottom: 10px;
        }
        p {
            color: #6b7280;
            font-size: 0.9rem;
            margin-bottom: 30px;
        }
        .form-group {
            margin-bottom: 25px;
            text-align: left;
        }
        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 0.85rem;
            color: #374151;
        }
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            font-size: 1.1rem;
            text-align: center;
            letter-spacing: 4px;
            outline: none;
            box-sizing: border-box;
        }
        .form-group input:focus {
            border-color: var(--logo-blue);
        }
        .btn-submit {
            width: 100%;
            padding: 12px;
            background-color: var(--logo-blue);
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.3s;
        }
        .btn-submit:hover {
            background-color: var(--logo-light-blue);
        }
        .messages {
            margin-bottom: 20px;
            list-style: none;
            padding: 0;
        }
        .messages li {
            padding: 10px 15px;
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: 600;
        }
        .messages li.error {
            background-color: #fee2e2;
            color: #991b1b;
        }
        .messages li.success {
            background-color: #d1fae5;
            color: #065f46;
        }
    </style>
</head>
<body>

<div class="login-card">
    <img src="{% static 'images/logo.JPEG' %}" alt="Bright Trust Janitorial Logo" class="logo">
    <h2>Cleaner Portal</h2>
    <p>Please enter your access PIN to log in and update job completion photos.</p>

    {% if messages %}
        <ul class="messages">
            {% for message in messages %}
                <li class="{{ message.tags }}">{{ message }}</li>
            {% endfor %}
        </ul>
    {% endif %}

    <form method="post">
        {% csrf_token %}
        <div class="form-group">
            <label for="pin">ACCESS PIN</label>
            <input type="password" id="pin" name="pin" maxlength="10" placeholder="••••" required autofocus autocomplete="off">
        </div>
        <button type="submit" class="btn-submit">LOG IN</button>
    </form>
</div>

</body>
</html>
